<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugam Prathana Bhawan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar and smooth scroll */
        body { scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        
        /* Fade-in Animation */
        .fade-in { animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating Animation */
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-gray-900 to-black text-white min-h-screen flex flex-col items-center justify-center font-sans overflow-x-hidden relative">

    <!-- Background decorative elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    </div>

    <!-- Main Content -->
    <main class="text-center fade-in z-10 px-4 w-full max-w-4xl">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-indigo-400 drop-shadow-lg">
            Sugam Prathana Bhawan
        </h1>
        <p class="text-xl md:text-2xl text-gray-300 mb-12 font-light tracking-wide">Welcome to our Church</p>
        
        <!-- Enter Button -->
        <a href="https://administrative-virtual-assistace.my.canva.site/sugamchurch" 
           class="inline-block px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold rounded-full shadow-[0_0_20px_rgba(37,99,235,0.4)] transform transition duration-300 hover:scale-105 mb-16 ring-2 ring-transparent hover:ring-blue-400">
            <span class="flex items-center gap-2 text-lg">
                Enter <i class="fas fa-arrow-right text-sm"></i>
            </span>
        </a>

        <!-- Social Links -->
        <div class="flex justify-center space-x-8">
            <a href="https://www.facebook.com/profile.php?id=61570084742537" target="_blank" class="text-gray-400 hover:text-blue-500 transform transition duration-300 hover:-translate-y-2 hover:scale-110 text-3xl" title="Facebook">
                <i class="fab fa-facebook drop-shadow-md"></i>
            </a>
            <a href="https://www.youtube.com/channel/UC4485U-13hFujFNmPXMye0g" target="_blank" class="text-gray-400 hover:text-red-500 transform transition duration-300 hover:-translate-y-2 hover:scale-110 text-3xl" title="YouTube">
                <i class="fab fa-youtube drop-shadow-md"></i>
            </a>
            <a href="mailto:sugamprathanabhawan@gmail.com" class="text-gray-400 hover:text-red-400 transform transition duration-300 hover:-translate-y-2 hover:scale-110 text-3xl" title="Email">
                <i class="fas fa-envelope drop-shadow-md"></i>
            </a>
            <a href="https://maps.app.goo.gl/iq4xxNhF4ix8qQyy9" target="_blank" class="text-gray-400 hover:text-green-500 transform transition duration-300 hover:-translate-y-2 hover:scale-110 text-3xl" title="Location Map">
                <i class="fas fa-map-marker-alt drop-shadow-md"></i>
            </a>
        </div>
    </main>

    <!-- Chatbot Toggle Button -->
    <button id="chatbot-toggle" class="fixed bottom-6 right-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white p-4 rounded-full shadow-2xl transition-all duration-300 transform hover:scale-110 z-50 float group">
        <i class="fas fa-comment-dots text-2xl group-hover:animate-pulse"></i>
    </button>

    <!-- Chatbot Window -->
    <div id="chatbot-window" class="fixed bottom-24 right-6 w-[90vw] max-w-sm bg-gray-800/95 backdrop-blur-md rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.5)] overflow-hidden hidden flex-col border border-gray-700 z-50 transition-all duration-300 transform translate-y-4 opacity-0">
        <!-- Header -->
        <div class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center">
            <h3 class="font-semibold flex items-center gap-2 text-blue-400">
                <i class="fas fa-cross text-indigo-400"></i> Church Assistant
            </h3>
            <button id="chatbot-close" class="text-gray-400 hover:text-red-400 transition transform hover:rotate-90">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        
        <!-- Chat Area -->
        <div id="chat-messages" class="p-4 h-80 overflow-y-auto chat-container flex flex-col space-y-4">
            <div class="bg-gray-700 text-white self-start p-3 rounded-2xl rounded-tl-sm max-w-[85%] text-sm shadow-md">
                Hello! Welcome to Sugam Prathana Bhawan. How can I assist you today? Feel free to ask about our services, location, or any questions about faith!
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-3 border-t border-gray-700 bg-gray-900 flex items-center gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-gray-800 border border-gray-700 text-white text-sm rounded-full px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-inner" placeholder="Type your message...">
            <button id="chat-send" class="bg-blue-600 hover:bg-blue-500 text-white p-2.5 rounded-full w-10 h-10 flex items-center justify-center transition shadow-md transform hover:scale-105 active:scale-95">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

 <script>
    // --- Chatbot UI Logic ---
    const chatbotToggle = document.getElementById('chatbot-toggle');
    const chatbotWindow = document.getElementById('chatbot-window');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    const GROQ_API_KEY = "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";

    function toggleChat() {
        if (chatbotWindow.classList.contains('hidden')) {
            chatbotWindow.classList.remove('hidden');
            void chatbotWindow.offsetWidth;
            chatbotWindow.classList.remove('translate-y-4', 'opacity-0');
            chatbotToggle.classList.remove('float');
        } else {
            chatbotWindow.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => {
                chatbotWindow.classList.add('hidden');
                chatbotToggle.classList.add('float');
            }, 300);
        }
    }

    chatbotToggle.addEventListener('click', toggleChat);
    chatbotClose.addEventListener('click', toggleChat);

    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `p-3 rounded-2xl max-w-[85%] text-sm shadow-md leading-relaxed ${
            isUser 
            ? 'bg-blue-600 text-white self-end rounded-tr-sm' 
            : 'bg-gray-700 text-white self-start rounded-tl-sm'
        }`;
        div.textContent = text;
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typing-indicator';
        div.className = 'bg-gray-700 text-white self-start p-3 rounded-2xl rounded-tl-sm max-w-[85%] text-sm text-gray-400 italic shadow-md flex gap-1 items-center';
        div.innerHTML = '<span class="animate-bounce">•</span><span class="animate-bounce" style="animation-delay: 0.2s">•</span><span class="animate-bounce" style="animation-delay: 0.4s">•</span>';
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Groq API Call
    async function fetchGroqResponse(prompt) {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        
        const systemPrompt = `You are a respectful, kind, and knowledgeable Christian assistant for Sugam Prathana Bhawan church. 
        Answer warmly and helpfully about church services, location, faith, Bible, prayer, or any spiritual questions. 
        Keep answers short and clear.`;

        const requestBody = {
            model: "llama-3.3-70b-versatile",
            messages: [
                { role: "system", content: systemPrompt },
                { role: "user", content: prompt }
            ],
            temperature: 0.7,
            max_tokens: 600
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) throw new Error("API Error");
            
            const data = await response.json();
            return data.choices[0].message.content.trim();
        } catch (error) {
            console.error("Groq Error:", error);
            return "Sorry, I'm having trouble connecting right now. Please try again later.";
        }
    }

    // Process user input
    async function processMessage(msg) {
        const lowerMsg = msg.toLowerCase();
        
        // Predefined quick replies
        if (lowerMsg.includes('location') || lowerMsg.includes('where') || lowerMsg.includes('address')) {
            return "Our church is located at Katyanichowk, Baneshwor.";
        } 
        if (lowerMsg.includes('youth service') || lowerMsg.includes('youth')) {
            return "Youth service timings are from 12:30 PM to 1:00 PM.";
        } 
        if (lowerMsg.includes('service time') || lowerMsg.includes('service')) {
            return "Our regular service time is from 11:00 AM to 1:00 PM.";
        } 
        if (lowerMsg.includes('denomination')) {
            return "We belong to the Trinity (Protestant) denomination.";
        }

        // Use Groq AI for everything else
        showTypingIndicator();
        const reply = await fetchGroqResponse(msg);
        removeTypingIndicator();
        return reply;
    }

    // Send message
    async function handleSend() {
        const text = chatInput.value.trim();
        if (!text) return;
        
        addMessage(text, true);
        chatInput.value = '';
        
        const reply = await processMessage(text);
        addMessage(reply, false);
    }

    chatSend.addEventListener('click', handleSend);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>
</body>
</html>
