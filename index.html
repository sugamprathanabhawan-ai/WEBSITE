<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Suprabha Bollen</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base font application */
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Dynamic Animated Gradient Background */
        .animated-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-6">

    <!-- Glassmorphism Container -->
    <div class="relative bg-white/10 backdrop-blur-xl border border-white/30 p-10 md:p-16 rounded-3xl shadow-2xl text-center max-w-2xl w-full transform transition-all hover:scale-[1.02] duration-500">
        
        <!-- Decorative subtle glowing orb in the background of the card -->
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-white/20 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Main Heading -->
        <h1 class="relative text-5xl md:text-6xl font-extrabold text-white mb-6 tracking-tight drop-shadow-lg leading-tight">
            Welcome to <br /> 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-pink-300 to-purple-300">
                SUGAM PRATHANA BHAWAN
            </span>
        </h1>
        
        <!-- Subheading -->
        <p class="relative text-white/90 text-lg md:text-xl mb-12 font-medium drop-shadow-md">
           हजुरहरूलाई हाम्रो मण्डलीमा स्वागत छ।
        </p>
        
        <!-- Big Enter Button -->
        <!-- REPLACE "YOUR_CANVA_LINK_HERE" WITH YOUR ACTUAL LINK -->
        <a href="https://administrative-virtual-assistace.my.canva.site/sugamchurch" target="_blank" rel="noopener noreferrer" class="relative inline-block group">
            
            <!-- Animated glowing shadow effect behind the button -->
            <div class="absolute -inset-1 bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 rounded-full blur-lg opacity-70 group-hover:opacity-100 transition duration-300 group-hover:duration-200 animate-pulse"></div>
            
            <!-- The actual button -->
            <div class="relative px-10 py-5 bg-white text-gray-900 font-bold text-xl md:text-2xl rounded-full transition-transform duration-300 transform group-hover:scale-105 shadow-xl flex items-center gap-3">
                Enter
                <!-- Arrow Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8 text-pink-500 transform group-hover:translate-x-2 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </div>
        </a>
        
    </div>

</body>
</html>
