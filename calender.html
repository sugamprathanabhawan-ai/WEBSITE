            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

</head>

            <a href="choirattendance.html" class="hover:text-primary-500 transition-colors flex items-center gap-2 font-medium">

            </a>
        </div>

        <!-- Main Navigation -->
        <nav id="navbar" class="w-full py-3 px-6 md:px-12 bg-white">

                <a href="index.html" class="flex items-center gap-3 text-gray-800 z-50 group">
                    <img src="images/logos.webp" alt="Sugam Prathana Bhawan Logo" class="w-10 h-10 rounded-full object-cover shadow-lg" onerror="this.src='https://via.placeholder.com/40'"/>

                <div class="hidden md:flex items-center space-x-8 text-gray-800 font-medium">
                    <a href="index.html" class="hover:text-primary-500 transition">Home</a>

                    <a href="calender.html" class="text-primary-500 font-semibold transition">Calendar</a>

                <a href="https://www.wordproject.org/bibles/ne/" target="_blank" class="mobile-link text-primary-600 hover:text-primary-500"><i class="fa-solid fa-book-bible"></i> Bible</a>

    <!-- Main Content: Full Screen PDF Viewer -->
    <main class="flex-1 relative bg-slate-200/50 pt-[104px] flex flex-col h-full">

        <div class="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 flex flex-wrap items-center gap-2 shadow-sm z-20">
            <label for="pdf-select" class="sr-only">Choose a calendar PDF</label>
            <select id="pdf-select" class="min-w-0 flex-1 sm:flex-none sm:w-72 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-800 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-200" disabled>
                <option>Loading calendars…</option>
            </select>
            <a id="download-pdf" href="#" download class="inline-flex items-center gap-2 rounded-lg bg-sky-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-sky-700 pointer-events-none opacity-50" aria-disabled="true">
                <i class="fa-solid fa-download"></i><span class="hidden sm:inline">Download</span>
            </a>
            <button id="fullscreen-pdf" type="button" class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-3 py-2 text-sm font-semibold text-white transition hover:bg-slate-700" title="View full screen">
                <i class="fa-solid fa-expand"></i><span class="hidden sm:inline">Full screen</span>
            </button>
        </div>

        <!-- Loading State -->
        <div id="viewer-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-10 pt-20">
            <div class="loader mb-4"></div>
            <p class="text-sky-900 font-medium animate-pulse" id="loading-text">Scanning for Calendar...</p>
        </div>

        <!-- Error State -->
        <div id="viewer-error" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-10 hidden px-6 text-center pt-20">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2" id="error-title">PDF Not Found</h2>
            <p class="text-gray-500 max-w-md" id="error-message">We couldn't find a PDF in the 'calender' folder.</p>
        </div>

        <!-- PDF Container (Wrapper handles native mobile scrolling) -->
        <div id="viewer-content" class="flex-1 w-full h-full overflow-y-auto" style="-webkit-overflow-scrolling: touch;">
            <!-- iframe will be injected here -->
        </div>
    </main>

    <!-- JavaScript Logic -->
    <script>
        // Mobile Navigation Toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('translate-x-full');
                mobileMenuBtn.innerHTML = mobileMenu.classList.contains('translate-x-full') 
                    ? '<i class="fa-solid fa-bars"></i>' 
                    : '<i class="fa-solid fa-xmark text-gray-800"></i>';
            });

            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('translate-x-full');
                    mobileMenuBtn.innerHTML = '<i class="fa-solid fa-bars"></i>';
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const FOLDER_PATH = './calender/';
            const MANIFEST_PATH = FOLDER_PATH + 'pdf-manifest.json';
            const FALLBACK_FILES = ['calender.pdf'];
            const viewerLoading = document.getElementById('viewer-loading');
            const loadingText = document.getElementById('loading-text');
            const viewerError = document.getElementById('viewer-error');
            const errorTitle = document.getElementById('error-title');
            const errorMessage = document.getElementById('error-message');
            const viewerContent = document.getElementById('viewer-content');
            const pdfSelect = document.getElementById('pdf-select');
            const downloadLink = document.getElementById('download-pdf');
            const fullscreenButton = document.getElementById('fullscreen-pdf');
            let pdfFiles = [];
            let currentPdfPath = '';

            const uniquePdfNames = (files) => [...new Set(files
                .map(file => typeof file === 'string' ? decodeURIComponent(file).split('/').pop() : '')
                .filter(file => file && /\.pdf$/i.test(file)))].sort((a, b) => a.localeCompare(b));

            async function getManifestFiles() {
                const response = await fetch(MANIFEST_PATH, { cache: 'no-store' });
                if (!response.ok) throw new Error('Calendar manifest unavailable');
                const manifest = await response.json();
                return Array.isArray(manifest) ? manifest : manifest.files || [];
            }

            async function getDirectoryFiles() {
                const response = await fetch(FOLDER_PATH, { cache: 'no-store' });
                if (!response.ok) throw new Error('Directory listing unavailable');
                const documentFromFolder = new DOMParser().parseFromString(await response.text(), 'text/html');
                return [...documentFromFolder.querySelectorAll('a')].map(link => link.getAttribute('href') || '');
            }

            async function fetchCalendarFiles() {
                const sources = await Promise.allSettled([getManifestFiles(), getDirectoryFiles()]);
                pdfFiles = uniquePdfNames(sources.flatMap(source => source.status === 'fulfilled' ? source.value : []));
                if (pdfFiles.length === 0) pdfFiles = FALLBACK_FILES;
                handleFilesFound();
            }

            function handleFilesFound() {
                if (pdfFiles.length === 0) {
                    showError('No Calendar Found', "We couldn't find any PDF files in the calendar folder.");
                    return;
                }
                pdfSelect.innerHTML = pdfFiles.map(file => `<option value="${encodeURIComponent(file)}">${file}</option>`).join('');
                pdfSelect.disabled = false;
                pdfSelect.addEventListener('change', () => loadPdf(decodeURIComponent(pdfSelect.value)));
                loadPdf(pdfFiles[0]);
            }

            function loadPdf(fileName) {
                viewerError.classList.add('hidden');
                viewerContent.innerHTML = '';
                viewerLoading.classList.remove('hidden');
                loadingText.innerText = 'Loading ' + fileName + '...';
                currentPdfPath = FOLDER_PATH + encodeURIComponent(fileName);
                pdfSelect.value = encodeURIComponent(fileName);
                downloadLink.href = currentPdfPath;
                downloadLink.download = fileName;
                downloadLink.classList.remove('pointer-events-none', 'opacity-50');
                downloadLink.removeAttribute('aria-disabled');

                const iframe = document.createElement('iframe');
                iframe.src = currentPdfPath + '#toolbar=1&navpanes=0';
                iframe.title = fileName;
                iframe.allowFullscreen = true;
                iframe.className = 'w-full h-full border-0 bg-slate-200/50';
                iframe.onload = () => viewerLoading.classList.add('hidden');
                viewerContent.appendChild(iframe);
            }

            fullscreenButton.addEventListener('click', () => {
                const fullscreenTarget = viewerContent;
                const request = fullscreenTarget.requestFullscreen || fullscreenTarget.webkitRequestFullscreen;
                if (request) request.call(fullscreenTarget);
                else if (currentPdfPath) window.open(currentPdfPath, '_blank', 'noopener');
            });

            function showError(title, message) {
                viewerLoading.classList.add('hidden');
                viewerContent.innerHTML = '';
                viewerError.classList.remove('hidden');
                errorTitle.innerText = title;
                errorMessage.innerText = message;
            }

            fetchCalendarFiles().catch(() => {
                pdfFiles = FALLBACK_FILES;
                handleFilesFound();
            });
        });
    </script>
</body>
</html>
